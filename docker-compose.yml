services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comic-api
    dns:
      - 10.88.0.100
      - 1.1.1.1
    restart: unless-stopped
    ports:
      - '3000:5000'
    env_file:
      - .env
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_DOCKER:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-change_me}@mongo:27017/comic_platform?authSource=admin}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
    volumes:
      - ./public:/app/public:ro
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - comic-net

  mongo:
    image: mongo:4.4
    container_name: comic-mongo
    restart: unless-stopped
    ports:
      - '127.0.0.1:27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-change_me}
      MONGO_INITDB_DATABASE: comic_platform
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongo --quiet --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin localhost:27017/admin --eval \"quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comic-net

  redis:
    image: redis:7-alpine
    container_name: comic-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:${REDIS_HOST_PORT:-6379}:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - comic-net

  # ── Anichin Auto-Scheduler ────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comic-scheduler
    dns:
      - 10.88.0.100
      - 1.1.1.1
    restart: unless-stopped
    command: ["node", "scripts/scheduler.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_DOCKER:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-change_me}@mongo:27017/comic_platform?authSource=admin}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
      SCRAPER_API_BASE_URL: ${SCRAPER_API_BASE_URL_DOCKER:-http://api:5000/api/v1}
      # Jadwal (cron syntax)
      SCRAPER_ANIME_ALL_CRON: "0 2 * * *"   # Anime/donghua all-source sync: tiap hari jam 02:00 WIB
      SCRAPER_COMIC_DAILY_CRON: "30 3 * * *" # Manga/manhwa/manhua sync: tiap hari jam 03:30 WIB
      SCRAPER_FULL_IMPORT_CRON: "0 5 * * *" # Full local import reset: tiap hari jam 05:00 WIB
      SCRAPER_SERIES_CRON: "0 3 * * *"      # Series sync: tiap hari jam 03:00 WIB
      SCRAPER_EPISODE_CRON: "0 * * * *"   # Episode sync: tiap jam
      SCRAPER_FULL_EPISODE_CRON: "0 1 * * 0" # Full sync: Minggu 01:00 WIB
      SCRAPER_TZ: "Asia/Jakarta"
      SCRAPER_DELAY_MS: "1000"
      SCRAPER_RUN_ON_STARTUP: "true"
      SCRAPER_ANIME_LIMIT_PER_SOURCE: "200"
    healthcheck:
      test: ["CMD", "node", "-e", "const fs=require('fs'); const cmd=fs.readFileSync('/proc/1/cmdline', 'utf8').replace(/\\u0000/g, ' ' ); process.exit(cmd.includes('scripts/scheduler.js') ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      api:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - comic-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comic-worker
    dns:
      - 172.18.0.100
      - 1.1.1.1
    restart: unless-stopped
    command: ["node", "src/jobs/worker.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_DOCKER:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-change_me}@mongo:27017/comic_platform?authSource=admin}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
      SCRAPER_API_BASE_URL: ${SCRAPER_API_BASE_URL_DOCKER:-http://api:5000/api/v1}
      SCRAPER_JOB_TIMEOUT_MS: "3600000"
      SCRAPER_WORKER_CONCURRENCY: "1"
    healthcheck:
      test: ["CMD", "node", "-e", "const fs=require('fs'); const cmd=fs.readFileSync('/proc/1/cmdline', 'utf8').replace(/\\u0000/g, ' ' ); process.exit(cmd.includes('src/jobs/worker.js') ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - comic-net

  # ── DNS Over HTTPS Proxy (Bypass Internet Positif) ─────────────────────
  dns-proxy:
    image: cloudflare/cloudflared:2024.12.0
    container_name: comic-dns-proxy
    command: proxy-dns --address 0.0.0.0 --port 53 --upstream https://1.1.1.1/dns-query --upstream https://1.0.0.1/dns-query
    networks:
      comic-net:
        ipv4_address: 10.88.0.100
    restart: unless-stopped

  # ── Local dev only ─────────────────────────────────────────────────────────
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comic-api-dev
    restart: unless-stopped
    ports:
      - '5001:5000'
    env_file:
      - .env
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGO_URI: ${MONGO_URI_DOCKER:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-change_me}@mongo:27017/comic_platform?authSource=admin}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
    volumes:
      - ./src:/app/src:ro
      - uploads_data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - comic-net
    profiles:
      - dev

volumes:
  mongo_data:
    external: true
    name: audira-api_mongo_data
  redis_data:
    external: true
    name: audira-api_redis_data
  uploads_data:
    external: true
    name: audira-api_uploads_data
  logs_data:
    driver: local

networks:
  comic-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.88.0.0/16
          gateway: 10.88.0.1
